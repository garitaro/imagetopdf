<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>自作ツールポータル</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; -webkit-user-select: none; user-select: none; }
        .container { max-width: 600px; margin: 60px auto; background: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; font-size: 1.4rem; margin-bottom: 25px; font-weight: bold; }
        .menu-grid { display: flex; flex-direction: column; gap: 18px; }
        
        .menu-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 22px 15px; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s, opacity 0.1s; }
        .menu-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        #btn-crop { background: #007bff; }
        #btn-merge { background: #2ecc71; }
        
        .btn-title { font-size: 1.15rem; margin-bottom: 6px; }
        .btn-desc { font-size: 0.8rem; opacity: 0.85; font-weight: normal; line-height: 1.4; text-align: center; max-width: 480px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>マイ自作ツールポータル</h1>
        <div class="menu-grid">
            <!-- フォルダ名指定により、末尾に index.html を書かなくても自動連動します -->
            <a href="image-to-pdf/" class="menu-btn" id="btn-crop">
                <span class="btn-title">🖼️ 画像一括トリミング ＆ PDF化</span>
                <span class="btn-desc">スクショの余白を削り、A4やB5の横幅に適合したPDFを生成します（Goodnotesのペン先縮小対策、ドラッグ＆ドロップ、1px微調整対応）</span>
            </a>
            <a href="pdf-merge/" class="menu-btn" id="btn-merge">
                <span class="btn-title">📄 PDF一括連結ツール</span>
                <span class="btn-desc">複数のPDFファイルを読み込み、直感的なドラッグ＆ドロップ操作で自由に順番を並び替えて1つのPDFに合体します</span>
            </a>
        </div>
    </div>
</body>
</html>
