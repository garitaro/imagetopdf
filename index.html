<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>画像一括トリミングツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; -webkit-user-select: none; user-select: none; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.2rem; margin-bottom: 5px; }
        input[type="file"] { display: block; margin: 15px auto; width: 100%; }
        
        #canvas-container { position: relative; width: 100%; border: 2px solid #ccc; overflow: hidden; display: none; margin-top: 10px; }
        canvas { width: 100%; display: block; background: #fff; }
        
        /* 比率・設定セクション */
        .config-section { text-align: center; margin-top: 10px; display: none; background: #f9f9f9; padding: 10px; border-radius: 5px; }
        .config-title { font-size: 0.85rem; color: #555; margin: 0 0 8px 0; font-weight: bold; }
        .ratio-buttons { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        button.ratio-btn { flex: 1; min-width: 70px; padding: 8px 6px; background: white; color: #555; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; cursor: pointer; font-weight: bold; }
        button.ratio-btn.selected { background: #e67e22; color: white; border-color: #e67e22; }
        
        /* 自由入力欄のスタイル */
        .custom-ratio-container { display: none; margin-top: 8px; margin-bottom: 12px; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem; color: #333; }
        .custom-ratio-container input { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-weight: bold; }

        .mode-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        button.choice { flex: 1; padding: 10px; background: white; color: #007bff; border: 2px solid #007bff; border-radius: 5px; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        button.choice.selected { background: #007bff; color: white; }
        
        .output-section { text-align: center; display: none; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #ddd; }
        .output-buttons { display: flex; justify-content: center; gap: 10px; }
        button.download-btn { flex: 1; padding: 12px; color: white; border: none; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #jpg-btn { background: #e67e22; }
        #pdf-btn { background: #2ecc71; }
        button:disabled { background: #ccc !important; border-color: #ccc !important; cursor: not_allowed; }
        #log { font-size: 0.85rem; margin-top: 10px; text-align: center; color: #2ecc71; font-weight: bold; min-height: 1.2rem; background: #f4fbf7; padding: 6px; border-radius: 3px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>画像一括トリミング＆結合</h1>
        <p style="font-size:0.8rem; text-align:center; color: #666; margin: 0;" id="version-display">仕様：インライン・ハンドルレンズ方式</p>
        
        <input type="file" id="files-input" multiple accept="image/png, image/jpeg">

        <div id="canvas-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        
        <div class="config-section" id="config-section">
            <p class="config-title">1. 比率の制約を選択</p>
            <div class="ratio-buttons">
                <button class="ratio-btn selected" data-ratio="free">自由</button>
                <button class="ratio-btn" data-ratio="16:9">16:9</button>
                <button class="ratio-btn" data-ratio="4:3">4:3</button>
                <button class="ratio-btn" data-ratio="custom">自由入力</button>
            </div>
            
            <div class="custom-ratio-container" id="custom-ratio-inputs">
                <input type="number" id="ratio-w" value="1" min="0.1" step="0.1">
                <span>：</span>
                <input type="number" id="ratio-h" value="1" min="0.1" step="0.1">
            </div>
            
            <p class="config-title">2. まとめる形式を選択</p>
            <div class="mode-buttons">
                <button class="choice" id="handout-btn">講義資料 (ページ分割)</button>
                <button class="choice" id="score-btn">楽譜 (縦に1枚に連結)</button>
            </div>
        </div>

        <div class="output-section" id="output-section">
            <p class="config-title">3. 保存する形式を押してダウンロード</p>
            <div class="output-buttons">
                <button class="download-btn" id="jpg-btn">JPG画像で保存</button>
                <button class="download-btn" id="pdf-btn">PDFファイルで保存</button>
            </div>
        </div>
        
        <p id="log">画像を読み込んでください。</p>
    </div>

<script>
    // ==========================================
    // ★ バージョン設定（ここを変更するだけで一括反映されます）
    // ==========================================
    const APP_VERSION = "v0.3"; 

    // 起動時にバージョンを各タイトルに動的に反映する処理
    (function initVersion() {
        document.title = `画像一括トリミングツール (${APP_VERSION})`;
        const displayEl = document.getElementById('version-display');
        if (displayEl) {
            displayEl.textContent = `仕様：インライン・ハンドルレンズ方式 (${APP_VERSION})`;
        }
    })();

    window.onerror = function(msg, url, line) {
        const log = document.getElementById('log');
        log.style.color = "#e74c3c"; log.style.background = "#fdf2f2";
        log.textContent = "エラー: " + msg + " (Line: " + line + ")";
        return false;
    };

    const filesInput = document.getElementById('files-input');
    const canvasContainer = document.getElementById('canvas-container');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctx = cropCanvas.getContext('2d');
    
    const configSection = document.getElementById('config-section');
    const ratioButtons = document.querySelectorAll('.ratio-btn');
    const customRatioInputs = document.getElementById('custom-ratio-inputs');
    const ratioW = document.getElementById('ratio-w');
    const ratioH = document.getElementById('ratio-h');

    const handoutBtn = document.getElementById('handout-btn');
    const scoreBtn = document.getElementById('score-btn');
    const outputSection = document.getElementById('output-section');
    const jpgBtn = document.getElementById('jpg-btn');
    const pdfBtn = document.getElementById('pdf-btn');
    const log = document.getElementById('log');

    let files = [];
    let cropArea = null; 
    let selectedMode = 'score'; 
    let currentRatio = 'free'; 
    let firstImageElement = null;

    let touchState = {
        mode: 'none', 
        targetHandle: -1, 
        startX: 0, startY: 0,
        initArea: null,
        currentX: 0, currentY: 0
    };

    function toggleDownloadButtons(enable) {
        jpgBtn.disabled = !enable;
        pdfBtn.disabled = !enable;
    }

    // （中略：画像処理コアロジック、タッチインタラクション、JPG/PDF書き出し処理は前回の最高精度のまま維持されています）
    function getRatioValue() {
        if (currentRatio === '16:9') return 16 / 9;
        if (currentRatio === '4:3') return 4 / 3;
        if (currentRatio === 'custom') {
            const w = parseFloat(ratioW.value) || 1;
            const h = parseFloat(ratioH.value) || 1;
            return w / h;
        }
        return null;
    }

    filesInput.addEventListener('change', (e) => {
        files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        if (files.length === 0) return;

        log.style.color = "#666"; log.style.background = "#f0f0f0";
        log.textContent = `${files.length} 枚の画像を読み込み中...`;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            firstImageElement = new Image();
            firstImageElement.onload = () => {
                cropCanvas.width = firstImageElement.width;
                cropCanvas.height = firstImageElement.height;
                
                const w = Math.round(cropCanvas.width * 0.8);
                const rVal = getRatioValue();
                const h = Math.round(currentRatio === 'free' ? cropCanvas.height * 0.2 : w / rVal);
                const x = Math.round((cropCanvas.width - w) / 2);
                const y = Math.round((cropCanvas.height - h) / 2);
                cropArea = { x, y, w, h };

                canvasContainer.style.display = 'block';
                configSection.style.display = 'block';
                outputSection.style.display = 'block';
                
                log.style.color = "#666"; log.style.background = "#f9f9f9";
                log.textContent = `編集モード：辺の四角形ハンドルをドラッグすると、その場が巨大ルーペ化します。`;
                
                scoreBtn.classList.add('selected');
                handoutBtn.classList.remove('selected');
                jpgBtn.style.display = 'block';
                toggleDownloadButtons(true);
                draw();
            };
            firstImageElement.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
    });

    ratioButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            ratioButtons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            currentRatio = btn.getAttribute('data-ratio');
            customRatioInputs.style.display = currentRatio === 'custom' ? 'flex' : 'none';
            applyRatioConstraint();
        });
    });

    [ratioW, ratioH].forEach(input => { input.addEventListener('input', applyRatioConstraint); });

    function applyRatioConstraint() {
        if (cropArea && currentRatio !== 'free') {
            const ratio = getRatioValue();
            cropArea.h = Math.round(cropArea.w / ratio);
            if (cropArea.y + cropArea.h > cropCanvas.height) {
                cropArea.h = cropCanvas.height - cropArea.y;
                cropArea.w = Math.round(cropArea.h * ratio);
            }
            draw();
        }
    }

    [handoutBtn, scoreBtn].forEach(btn => {
        btn.addEventListener('click', () => {
            [handoutBtn, scoreBtn].forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedMode = btn.id.replace('-btn', '');
            jpgBtn.style.display = selectedMode === 'handout' ? 'none' : 'block';
        });
    });

    function getHandles(area) {
        const x = area.x; const y = area.y; const w = area.w; const h = area.h;
        return [
            { x: x, y: y },          // 0: 左上
            { x: x + w/2, y: y },    // 1: 上中央
            { x: x + w, y: y },      // 2: 右上
            { x: x + w, y: y + h/2 },// 3: 右中央
            { x: x + w, y: y + h },  // 4: 右下
            { x: x + w/2, y: y + h },// 5: 下中央
            { x: x, y: y + h },      // 6: 左下
            { x: x, y: y + h/2 }     // 7: 左中央
        ];
    }

    function draw() {
        if (!firstImageElement || !cropArea) return;
        ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.drawImage(firstImageElement, 0, 0);

        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, cropCanvas.width, cropArea.y); 
        ctx.fillRect(0, cropArea.y + cropArea.h, cropCanvas.width, cropCanvas.height - (cropArea.y + cropArea.h)); 
        ctx.fillRect(0, cropArea.y, cropArea.x, cropArea.h); 
        ctx.fillRect(cropArea.x + cropArea.w, cropArea.y, cropCanvas.width - (cropArea.x + cropArea.w), cropArea.h); 

        ctx.strokeStyle = "#ff3333"; ctx.lineWidth = Math.max(3, cropCanvas.width / 350);
        ctx.strokeRect(cropArea.x, cropArea.y, cropArea.w, cropArea.h);

        const handles = getHandles(cropArea);
        const hSize = Math.max(14, cropCanvas.width / 70); 
        ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#007bff"; ctx.lineWidth = Math.max(2, cropCanvas.width / 500);

        handles.forEach((h, idx) => {
            if (touchState.mode === 'resize' && touchState.targetHandle === idx) return;
            ctx.fillRect(h.x - hSize/2, h.y - hSize/2, hSize, hSize);
            ctx.strokeRect(h.x - hSize/2, h.y - hSize/2, hSize, hSize);
        });

        if (touchState.mode !== 'none' && (touchState.mode === 'resize' || touchState.mode === 'create')) {
            const loupeSize = Math.max(110, cropCanvas.width * 0.25);
            let centerX, centerY;
            if (touchState.mode === 'resize') {
                centerX = handles[touchState.targetHandle].x; centerY = handles[touchState.targetHandle].y;
            } else {
                centerX = touchState.currentX; centerY = touchState.currentY;
            }
            const lX = centerX - loupeSize / 2; const lY = centerY - loupeSize / 2;

            ctx.save();
            ctx.beginPath(); ctx.rect(lX, lY, loupeSize, loupeSize); ctx.clip();
            ctx.fillStyle = "#ffffff"; ctx.fillRect(lX, lY, loupeSize, loupeSize);
            
            const srcSize = 32; 
            ctx.drawImage(firstImageElement, centerX - srcSize/2, centerY - srcSize/2, srcSize, srcSize, lX, lY, loupeSize, loupeSize);

            const scale = loupeSize / srcSize;
            const rx = lX + loupeSize/2 + (cropArea.x - centerX) * scale;
            const ry = lY + loupeSize/2 + (cropArea.y - centerY) * scale;
            const rw = cropArea.w * scale; const rh = cropArea.h * scale;
            
            ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 4;
            ctx.strokeRect(rx, ry, rw, rh);
            ctx.restore();

            ctx.strokeStyle = "#007bff"; ctx.lineWidth = 3; ctx.strokeRect(lX, lY, loupeSize, loupeSize);
            ctx.fillStyle = "#007bff"; ctx.fillRect(centerX - 3, centerY - 3, 6, 6);
        }
    }

    function getTouchPos(canvas, e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width; var scaleY = canvas.height / rect.height;
        var touch = e.touches[0];
        return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
    }

    cropCanvas.addEventListener('touchstart', (e) => {
        if (!firstImageElement || !cropArea) return;
        const pos = getTouchPos(cropCanvas, e);
        const touchThreshold = (cropCanvas.width / cropCanvas.offsetWidth) * 40;
        const handles = getHandles(cropArea);
        
        let hitHandle = -1;
        for (let i = 0; i < handles.length; i++) {
            const dist = Math.hypot(pos.x - handles[i].x, pos.y - handles[i].y);
            if (dist < touchThreshold) { hitHandle = i; break; }
        }

        touchState.startX = pos.x; touchState.startY = pos.y;
        touchState.currentX = pos.x; touchState.currentY = pos.y;
        touchState.initArea = { ...cropArea };

        if (hitHandle !== -1) {
            touchState.mode = 'resize'; touchState.targetHandle = hitHandle;
        } else if (pos.x >= cropArea.x && pos.x <= cropArea.x + cropArea.w &&
                   pos.y >= cropArea.y && pos.y <= cropArea.y + cropArea.h) {
            touchState.mode = 'move';
        } else {
            touchState.mode = 'create';
            touchState.initArea = { x: pos.x, y: pos.y, w: 0, h: 0 };
            cropArea = { x: pos.x, y: pos.y, w: 10, h: 10 };
        }
        draw();
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchmove', (e) => {
        if (touchState.mode === 'none' || !firstImageElement) return;
        const pos = getTouchPos(cropCanvas, e);
        touchState.currentX = pos.x; touchState.currentY = pos.y;
        
        const dx = pos.x - touchState.startX; const dy = pos.y - touchState.startY;
        const init = touchState.initArea; const ratio = getRatioValue();

        if (touchState.mode === 'move') {
            cropArea.x = Math.max(0, Math.min(cropCanvas.width - init.w, init.x + dx));
            cropArea.y = Math.max(0, Math.min(cropCanvas.height - init.h, init.y + dy));
        } 
        else if (touchState.mode === 'create') {
            let newW = pos.x - init.x;
            let newH = currentRatio === 'free' ? (pos.y - init.y) : newW / ratio;
            cropArea.x = newW >= 0 ? init.x : init.x + newW;
            cropArea.y = newH >= 0 ? init.y : init.y + newH;
            cropArea.w = Math.abs(newW); cropArea.h = Math.abs(newH);
        } 
        else if (touchState.mode === 'resize') {
            let hIdx = touchState.targetHandle;
            let left = init.x; let top = init.y; let right = init.x + init.w; let bottom = init.y + init.h;

            if (hIdx === 0 || hIdx === 6 || hIdx === 7) left = Math.min(right - 20, init.x + dx);
            if (hIdx === 2 || hIdx === 3 || hIdx === 4) right = Math.max(left + 20, init.x + init.w + dx);
            if (hIdx === 0 || hIdx === 1 || hIdx === 2) top = Math.min(bottom - 20, init.y + dy);
            if (hIdx === 4 || hIdx === 5 || hIdx === 6) bottom = Math.max(top + 20, init.y + init.h + dy);

            let w = right - left; let h = bottom - top;

            if (currentRatio !== 'free') {
                if (hIdx === 3 || hIdx === 7) { 
                    h = w / ratio; top = init.y - (h - init.h) / 2; bottom = top + h;
                } else if (hIdx === 1 || hIdx === 5) { 
                    w = h * ratio; left = init.x - (w - init.w) / 2; right = left + w;
                } else {
                    if (w / h > ratio) { h = w / ratio; } else { w = h * ratio; }
                    if (hIdx === 0) { left = right - w; top = bottom - h; }   
                    if (hIdx === 2) { right = left + w; top = bottom - h; }   
                    if (hIdx === 4) { right = left + w; bottom = top + h; }   
                    if (hIdx === 6) { left = right - w; bottom = top + h; }   
                }
            }

            if (left >= 0 && right <= cropCanvas.width && top >= 0 && bottom <= cropCanvas.height) {
                cropArea = { x: Math.round(left), y: Math.round(top), w: Math.round(right - left), h: Math.round(bottom - top) };
            }
        }
        draw();
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchend', (e) => {
        touchState.mode = 'none'; draw(); 
        log.style.color = "#2ecc71";
        log.textContent = `範囲確定（横:${cropArea.w}px, 縦:${cropArea.h}px）。保存形式を選んでダウンロードしてください。`;
    }, {passive: false});

    async function generateFinalCanvas() {
        log.style.color = "#666"; log.textContent = "指定された範囲だけで新しい画像を1から合成しています...";
        const workCanvas = document.createElement('canvas'); workCanvas.width = cropArea.w; workCanvas.height = cropArea.h;
        const workCtx = workCanvas.getContext('2d');
        const finalCanvas = document.createElement('canvas'); finalCanvas.width = cropArea.w;
        finalCanvas.height = selectedMode === 'score' ? cropArea.h * files.length : cropArea.h;
        const finalCtx = finalCanvas.getContext('2d');
        let currentY = 0; let imagesDataArray = [];

        for (let i = 0; i < files.length; i++) {
            await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        workCtx.clearRect(0, 0, cropArea.w, cropArea.h);
                        workCtx.drawImage(img, cropArea.x, cropArea.y, cropArea.w, cropArea.h, 0, 0, cropArea.w, cropArea.h);
                        if (selectedMode === 'score') {
                            finalCtx.drawImage(workCanvas, 0, currentY); currentY += cropArea.h;
                        } else { imagesDataArray.push(workCanvas.toDataURL('image/jpeg', 0.9)); }
                        log.textContent = `画像加工中: ${i + 1} / ${files.length} 枚目...`;
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(files[i]);
            });
        }
        return { canvas: finalCanvas, handoutData: imagesDataArray };
    }

    jpgBtn.addEventListener('click', async () => {
        toggleDownloadButtons(false); const result = await generateFinalCanvas();
        const link = document.createElement('a'); link.download = 'combined_sheet_music.jpg';
        link.href = result.canvas.toDataURL('image/jpeg', 0.92); link.click();
        log.style.color = "#2ecc71"; log.textContent = "✅ 完全余白なしJPG画像の保存に成功しました！";
        toggleDownloadButtons(true);
    });

    pdfBtn.addEventListener('click', async () => {
        toggleDownloadButtons(false); const result = await generateFinalCanvas();
        log.style.color = "#666"; log.textContent = "PDF変換を実行中...";
        if (!window.jspdf || !window.jspdf.jsPDF) {
            log.style.color = "#e74c3c"; log.textContent = "エラー: ライブラリ未ロード。";
            toggleDownloadButtons(true); return;
        }
        const { jsPDF } = window.jspdf;
        const ptW = cropArea.w * 0.75; const ptH = cropArea.h * 0.75;

        if (selectedMode === 'score') {
            const totalPtH = ptH * files.length; const pdf = new jsPDF('p', 'pt', [ptW, totalPtH]);
            const imgData = result.canvas.toDataURL('image/jpeg', 0.9);
            pdf.addImage(imgData, 'JPEG', 0, 0, ptW, totalPtH); pdf.save('combined_sheet_music.pdf');
        } else {
            const orientation = cropArea.w >= cropArea.h ? 'l' : 'p'; const pdf = new jsPDF(orientation, 'pt', [ptW, ptH]);
            for (let i = 0; i < result.handoutData.length; i++) {
                if (i > 0) pdf.addPage([ptW, ptH], orientation);
                pdf.addImage(result.handoutData[i], 'JPEG', 0, 0, ptW, ptH);
            }
            pdf.save('handout_material.pdf');
        }
        log.style.color = "#2ecc71"; log.textContent = "✅ 完全余白なしPDFファイルの保存に成功しました！";
        toggleDownloadButtons(true);
    });
</script>
</body>
</html>
