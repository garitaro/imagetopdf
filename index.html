<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>演奏動画スクショ → 楽譜PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.2rem; }
        input[type="file"] { display: block; margin: 20px auto; }
        #canvas-container { position: relative; width: 100%; border: 2px solid #ccc; overflow: hidden; display: none; }
        canvas { width: 100%; display: block; }
        .buttons { text-align: center; margin-top: 20px; display: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; }
        button:disabled { background: #ccc; }
        #log { font-size: 0.8rem; margin-top: 10px; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>楽譜作成 (一括トリミング & PDF)</h1>
        <p style="font-size:0.9rem; text-align:center;">GitHub Pages ホスト、広告なし</p>
        
        <input type="file" id="files-input" multiple accept="image/png, image/jpeg">
        
        <div id="canvas-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        
        <div class="buttons" id="buttons">
            <button id="process-btn">この範囲で楽譜PDFを作成</button>
        </div>
        
        <p id="log"></p>
    </div>

<script>
    const filesInput = document.getElementById('files-input');
    const canvasContainer = document.getElementById('canvas-container');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctx = cropCanvas.getContext('2d');
    const buttons = document.getElementById('buttons');
    const processBtn = document.getElementById('process-btn');
    const log = document.getElementById('log');

    let files = [];
    let isDrawing = false;
    let startX, startY;
    let cropArea = null; // {x, y, w, h} (ピクセル単位)

    // 1. ファイル選択と最初の画像描画
    filesInput.addEventListener('change', (e) => {
        files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        if (files.length === 0) return;

        log.textContent = `${files.length} 枚を読み込み中...`;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                cropCanvas.width = img.width;
                cropCanvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                canvasContainer.style.display = 'block';
                buttons.style.display = 'block';
                log.textContent = `1枚目の楽譜の一段分を指で囲んでください。`;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
    });

    // 2. スマホ対応（タッチイベント）での範囲指定
    function getTouchPos(canvas, e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var touch = e.touches[0];
        return {
            x: (touch.clientX - rect.left) * scaleX,
            y: (touch.clientY - rect.top) * scaleY
        };
    }

    cropCanvas.addEventListener('touchstart', (e) => {
        const pos = getTouchPos(cropCanvas, e);
        startX = pos.x;
        startY = pos.y;
        isDrawing = true;
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const pos = getTouchPos(cropCanvas, e);
        
        // 最初の画像の再描画
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                // 赤い枠線を描画
                ctx.strokeStyle = "red";
                ctx.lineWidth = 10;
                ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchend', (e) => {
        const touches = e.changedTouches;
        const pos = getTouchPos(cropCanvas, {touches: touches});
        cropArea = {
            x: Math.round(startX),
            y: Math.round(startY),
            w: Math.round(pos.x - startX),
            h: Math.round(pos.y - startY)
        };
        isDrawing = false;
        log.textContent = `範囲確定。下のボタンを押して一括処理を開始します。`;
    }, {passive: false});

    // 3. 一括処理とPDF作成
    processBtn.addEventListener('click', async () => {
        if (!cropArea || cropArea.w <= 0 || cropArea.h <= 0) {
            alert("範囲を指定してください。");
            return;
        }
        processBtn.disabled = true;
        log.textContent = "処理を開始します。全画像をトリミング・連結中...";

        const croppedCanvas = document.createElement('canvas');
        croppedCanvas.width = cropArea.w;
        croppedCanvas.height = cropArea.h;
        const croppedCtx = croppedCanvas.getContext('2d');

        // 連結用の巨大キャンバスを作成
        const combinedCanvas = document.createElement('canvas');
        combinedCanvas.width = cropArea.w;
        combinedCanvas.height = cropArea.h * files.length;
        const combinedCtx = combinedCanvas.getContext('2d');

        let currentY = 0;

        // 全画像をループ処理
        for (let i = 0; i < files.length; i++) {
            await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // トリミング
                        croppedCtx.drawImage(img, cropArea.x, cropArea.y, cropArea.w, cropArea.h, 0, 0, cropArea.w, cropArea.h);
                        // 巨大キャンバスに貼り付け
                        combinedCtx.drawImage(croppedCanvas, 0, currentY);
                        currentY += cropArea.h;
                        log.textContent = `${i + 1} / ${files.length} 枚を処理しました。`;
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(files[i]);
            });
        }

        // PDF化してダウンロード
        log.textContent = "PDFを作成してダウンロード中...";
        const { jsPDF } = window.jspdf;
        // PDFのサイズ設定（ピクセル値をポイントに変換。1px ≈ 0.75pt）
        const pdf = new jsPDF('p', 'pt', [combinedCanvas.width * 0.75, combinedCanvas.height * 0.75]);
        const imgData = combinedCanvas.toDataURL('image/jpeg', 0.8);
        pdf.addImage(imgData, 'JPEG', 0, 0);
        pdf.save('sheet_music_combined.pdf');

        processBtn.disabled = false;
        log.textContent = "✅ 完了！PDFがダウンロードされました。";
    });
</script>
</body>
</html>
