<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>画像ツール (講義資料＆楽譜) | 修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.2rem; }
        input[type="file"] { display: block; margin: 20px auto; }
        #canvas-container { position: relative; width: 100%; border: 2px solid #ccc; overflow: hidden; display: none; }
        canvas { width: 100%; display: block; }
        .action-select { text-align: center; margin-top: 20px; display: none; }
        .action-title { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .action-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button.choice { flex: 1; padding: 10px; background: white; color: #007bff; border: 2px solid #007bff; border-radius: 5px; font-size: 0.9rem; cursor: pointer; }
        button.choice.selected { background: #007bff; color: white; }
        .buttons { text-align: center; display: none; }
        button.execute { padding: 10px 30px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; }
        button:disabled { background: #ccc; border-color: #ccc; cursor: not_allowed; }
        #log { font-size: 0.8rem; margin-top: 10px; text-align: center; color: #666; min-height: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>画像ツール (一括トリミング & PDF)</h1>
        <p style="font-size:0.8rem; text-align:center; color: #666;">はみ出し修正版</p>
        
        <input type="file" id="files-input" multiple accept="image/png, image/jpeg">
        
        <div id="canvas-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        
        <div class="action-select" id="action-select">
            <p class="action-title">処理を選択</p>
            <div class="action-buttons">
                <button class="choice" id="handout-btn">講義資料 (ページ分割)</button>
                <button class="choice" id="score-btn">楽譜 (縦連結)</button>
            </div>
        </div>

        <div class="buttons" id="buttons">
            <button class="execute" id="execute-btn" disabled>PDFを作成</button>
        </div>
        
        <p id="log"></p>
    </div>

<script>
    const filesInput = document.getElementById('files-input');
    const canvasContainer = document.getElementById('canvas-container');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctx = cropCanvas.getContext('2d');
    const actionSelect = document.getElementById('action-select');
    const handoutBtn = document.getElementById('handout-btn');
    const scoreBtn = document.getElementById('score-btn');
    const buttons = document.getElementById('buttons');
    const executeBtn = document.getElementById('execute-btn');
    const log = document.getElementById('log');

    const { jsPDF } = window.jspdf;
    let files = [];
    let isDrawing = false;
    let startX, startY;
    let cropArea = null; 
    let selectedMode = null; 

    // 1. ファイル選択と最初の画像描画
    filesInput.addEventListener('change', (e) => {
        files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        if (files.length === 0) return;

        log.textContent = `${files.length} 枚を読み込み中...`;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                cropCanvas.width = img.width;
                cropCanvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                canvasContainer.style.display = 'block';
                actionSelect.style.display = 'block';
                buttons.style.display = 'block';
                log.textContent = `1枚目のトリミング範囲を指で囲んでください。`;
                [handoutBtn, scoreBtn].forEach(b => b.classList.remove('selected'));
                executeBtn.disabled = true;
                selectedMode = null;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
    });

    // 2. スマホ・iPad対応での範囲指定
    function getTouchPos(canvas, e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var touch = e.touches[0];
        return {
            x: (touch.clientX - rect.left) * scaleX,
            y: (touch.clientY - rect.top) * scaleY
        };
    }

    cropCanvas.addEventListener('touchstart', (e) => {
        const pos = getTouchPos(cropCanvas, e);
        startX = pos.x;
        startY = pos.y;
        isDrawing = true;
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const pos = getTouchPos(cropCanvas, e);
        
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                ctx.strokeStyle = "red";
                ctx.lineWidth = Math.max(8, img.width / 120); 
                ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(files[0]);
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchend', (e) => {
        if (!isDrawing) return;
        const touches = e.changedTouches;
        const pos = getTouchPos(cropCanvas, {touches: touches});
        
        // ドラッグ方向が逆（右から左など）でも正しく計算する処理
        const x = Math.min(startX, pos.x);
        const y = Math.min(startY, pos.y);
        const w = Math.abs(pos.x - startX);
        const h = Math.abs(pos.y - startY);

        cropArea = { x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h) };
        isDrawing = false;
        log.textContent = `範囲確定。処理を選択して「PDFを作成」を押してください。`;
        if (selectedMode) executeBtn.disabled = false;
    }, {passive: false});

    // 3. 分岐の選択
    [handoutBtn, scoreBtn].forEach(btn => {
        btn.addEventListener('click', () => {
            [handoutBtn, scoreBtn].forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedMode = btn.id.replace('-btn', '');
            if (cropArea && cropArea.w > 0 && cropArea.h > 0) executeBtn.disabled = false;
        });
    });

    // 4. 実行 (はみ出し修正ロジック)
    executeBtn.addEventListener('click', async () => {
        if (!cropArea || cropArea.w <= 0 || cropArea.h <= 0 || !selectedMode) {
            alert("範囲と処理を指定してください。");
            return;
        }
        executeBtn.disabled = true;
        log.textContent = "処理を開始します。画像をトリミング中...";

        const croppedCanvas = document.createElement('canvas');
        croppedCanvas.width = cropArea.w;
        croppedCanvas.height = cropArea.h;
        const croppedCtx = croppedCanvas.getContext('2d');

        // pt単位への変換 (1px = 0.75pt)
        const ptW = cropArea.w * 0.75;
        const ptH = cropArea.h * 0.75;

        if (selectedMode === 'handout') {
            // --- 講義資料 (ページ分割) ---
            log.textContent = "講義資料としてPDFを作成中...";
            
            // 画像の向き（縦長か横長か）を自動判定してPDFのベースを作成
            const orientation = cropArea.w >= cropArea.h ? 'l' : 'p';
            const pdf = new jsPDF(orientation, 'pt', [ptW, ptH]);

            for (let i = 0; i < files.length; i++) {
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            croppedCtx.clearRect(0, 0, cropArea.w, cropArea.h);
                            croppedCtx.drawImage(img, cropArea.x, cropArea.y, cropArea.w, cropArea.h, 0, 0, cropArea.w, cropArea.h);
                            const imgData = croppedCanvas.toDataURL('image/jpeg', 0.85);
                            
                            if (i > 0) {
                                pdf.addPage([ptW, ptH], orientation);
                            }
                            // 修正：第4引数と第5引数に「貼り付けるサイズ」を明示してはみ出しを防ぐ
                            pdf.addImage(imgData, 'JPEG', 0, 0, ptW, ptH);
                            log.textContent = `${i + 1} / ${files.length} 枚を処理しました。`;
                            resolve();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(files[i]);
                });
            }
            pdf.save('handout.pdf');

        } else if (selectedMode === 'score') {
            // --- 楽譜 (縦連結) ---
            log.textContent = "楽譜として縦に連結中...";
            const combinedCanvas = document.createElement('canvas');
            combinedCanvas.width = cropArea.w;
            combinedCanvas.height = cropArea.h * files.length;
            const combinedCtx = combinedCanvas.getContext('2d');

            let currentY = 0;

            for (let i = 0; i < files.length; i++) {
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            croppedCtx.clearRect(0, 0, cropArea.w, cropArea.h);
                            croppedCtx.drawImage(img, cropArea.x, cropArea.y, cropArea.w, cropArea.h, 0, 0, cropArea.w, cropArea.h);
                            combinedCtx.drawImage(croppedCanvas, 0, currentY);
                            currentY += cropArea.h;
                            log.textContent = `${i + 1} / ${files.length} 枚を処理しました。`;
                            resolve();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(files[i]);
                });
            }
            log.textContent = "PDFを作成してダウンロード中...";
            
            const totalPtH = ptH * files.length;
            const pdf = new jsPDF('p', 'pt', [ptW, totalPtH]);
            const imgData = combinedCanvas.toDataURL('image/jpeg', 0.85);
            
            // 修正：連結画像もPDFの全域（ptW, totalPtH）にピッタリ収める
            pdf.addImage(imgData, 'JPEG', 0, 0, ptW, totalPtH);
            pdf.save('sheet_music_combined.pdf');
        }

        executeBtn.disabled = false;
        log.textContent = "✅ 完了！PDFがダウンロードされました。";
    });
</script>
</body>
</html>
