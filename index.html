<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>画像一括トリミングツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 1.2rem; margin-bottom: 5px; }
        input[type="file"] { display: block; margin: 15px auto; width: 100%; }
        #canvas-container { position: relative; width: 100%; border: 2px solid #ccc; overflow: hidden; display: none; }
        canvas { width: 100%; display: block; background: #fff; }
        .mode-select { text-align: center; margin-top: 15px; display: none; }
        .mode-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        button.choice { flex: 1; padding: 12px; background: white; color: #007bff; border: 2px solid #007bff; border-radius: 5px; font-size: 0.95rem; font-weight: bold; cursor: pointer; }
        button.choice.selected { background: #007bff; color: white; }
        .output-section { text-align: center; display: none; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #ddd; }
        .output-buttons { display: flex; justify-content: center; gap: 10px; }
        button.download-btn { flex: 1; padding: 12px; color: white; border: none; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #jpg-btn { background: #e67e22; }
        #pdf-btn { background: #2ecc71; }
        button:disabled { background: #ccc !important; border-color: #ccc !important; cursor: not_allowed; }
        #log { font-size: 0.85rem; margin-top: 10px; text-align: center; color: #e74c3c; font-weight: bold; min-height: 1.2rem; background: #fdf2f2; padding: 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>画像一括トリミング & 結合</h1>
        <p style="font-size:0.8rem; text-align:center; color: #666; margin: 0;">【起動トラブル修正版】</p>
        
        <input type="file" id="files-input" multiple accept="image/png, image/jpeg">
        
        <div id="canvas-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        
        <div class="mode-select" id="mode-select">
            <p style="font-size: 0.9rem; margin: 5px 0; color: #555;">1. まとめる形式を選択</p>
            <div class="mode-buttons">
                <button class="choice" id="handout-btn">講義資料 (ページ分割)</button>
                <button class="choice" id="score-btn">楽譜 (縦に1枚に連結)</button>
            </div>
        </div>

        <div class="output-section" id="output-section">
            <p style="font-size: 0.9rem; margin: 5px 0; color: #555;">2. 範囲を囲んだら、保存する形式を押してダウンロード</p>
            <div class="output-buttons">
                <button class="download-btn" id="jpg-btn">JPG画像で保存</button>
                <button class="download-btn" id="pdf-btn">PDFファイルで保存</button>
            </div>
        </div>
        
        <p id="log">画像を読み込んでください。</p>
    </div>

<script>
    // 万が一のエラーを画面に表示するデバッグ機能
    window.onerror = function(msg, url, line) {
        document.getElementById('log').textContent = "エラー発生: " + msg + " (Line: " + line + ")";
        return false;
    };

    const filesInput = document.getElementById('files-input');
    const canvasContainer = document.getElementById('canvas-container');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctx = cropCanvas.getContext('2d');
    const modeSelect = document.getElementById('mode-select');
    const handoutBtn = document.getElementById('handout-btn');
    const scoreBtn = document.getElementById('score-btn');
    const outputSection = document.getElementById('output-section');
    const jpgBtn = document.getElementById('jpg-btn');
    const pdfBtn = document.getElementById('pdf-btn');
    const log = document.getElementById('log');

    let files = [];
    let isDrawing = false;
    let startX, startY;
    let cropArea = null; 
    let selectedMode = 'score'; // デフォルトは楽譜モード
    let firstImageElement = null;

    // ボタンの有効・無効切り替え関数
    function toggleDownloadButtons(enable) {
        jpgBtn.disabled = !enable;
        pdfBtn.disabled = !enable;
    }

    // 1. ファイル読み込み
    filesInput.addEventListener('change', (e) => {
        try {
            files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            if (files.length === 0) return;

            log.style.color = "#666";
            log.textContent = `${files.length} 枚の画像を処理キューに登録しました。1枚目を解析中...`;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                firstImageElement = new Image();
                firstImageElement.onload = () => {
                    // キャンバスのサイズを設定して表示
                    cropCanvas.width = firstImageElement.width;
                    cropCanvas.height = firstImageElement.height;
                    ctx.drawImage(firstImageElement, 0, 0);
                    
                    canvasContainer.style.display = 'block';
                    modeSelect.style.display = 'block';
                    outputSection.style.display = 'block';
                    
                    log.textContent = `読み込み成功！画像の上を指でドラッグして、切り抜く範囲を赤枠で囲んでください。`;
                    
                    // 初期表示のボタン状態
                    scoreBtn.classList.add('selected');
                    handoutBtn.classList.remove('selected');
                    jpgBtn.style.display = 'block';
                    toggleDownloadButtons(false);
                };
                firstImageElement.src = event.target.result;
            };
            reader.readAsDataURL(files[0]);
        } catch (err) {
            log.style.color = "#e74c3c";
            log.textContent = "ファイル読み込みエラー: " + err.message;
        }
    });

    // 2. タッチ操作（iPad・スマホ対応）
    function getTouchPos(canvas, e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var touch = e.touches[0];
        return {
            x: (touch.clientX - rect.left) * scaleX,
            y: (touch.clientY - rect.top) * scaleY
        };
    }

    cropCanvas.addEventListener('touchstart', (e) => {
        if (!firstImageElement) return;
        const pos = getTouchPos(cropCanvas, e);
        startX = pos.x;
        startY = pos.y;
        isDrawing = true;
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchmove', (e) => {
        if (!isDrawing || !firstImageElement) return;
        const pos = getTouchPos(cropCanvas, e);
        
        ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.drawImage(firstImageElement, 0, 0);
        
        ctx.strokeStyle = "red";
        ctx.lineWidth = Math.max(6, cropCanvas.width / 150); 
        ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
        e.preventDefault();
    }, {passive: false});

    cropCanvas.addEventListener('touchend', (e) => {
        if (!isDrawing) return;
        const touches = e.changedTouches;
        const pos = getTouchPos(cropCanvas, {touches: touches});
        
        const x = Math.min(startX, pos.x);
        const y = Math.min(startY, pos.y);
        const w = Math.abs(pos.x - startX);
        const h = Math.abs(pos.y - startY);

        if (w > 10 && h > 10) {
            cropArea = { x: Math.round(x), y: Math.round(y), w: Math.round(w), h: Math.round(h) };
            log.style.color = "#2ecc71";
            log.textContent = `範囲確定（横:${w}px, 縦:${h}px）。保存ボタンを押してください。`;
            toggleDownloadButtons(true);
        } else {
            log.style.color = "#e74c3c";
            log.textContent = `ドラッグの範囲が狭すぎます。もう一度しっかり囲んでください。`;
            toggleDownloadButtons(false);
        }
        isDrawing = false;
    }, {passive: false});

    // 3. モード切り替え
    [handoutBtn, scoreBtn].forEach(btn => {
        btn.addEventListener('click', () => {
            [handoutBtn, scoreBtn].forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedMode = btn.id.replace('-btn', '');
            
            if (selectedMode === 'handout') {
                jpgBtn.style.display = 'none';
            } else {
                jpgBtn.style.display = 'block';
            }
        });
    });

    // 4. 新しい画像をCanvas上で生成するコアロジック
    async function generateFinalCanvas() {
        log.style.color = "#666";
        log.textContent = "新画像をメモリ内で結合しています...";
        
        const workCanvas = document.createElement('canvas');
        workCanvas.width = cropArea.w;
        workCanvas.height = cropArea.h;
        const workCtx = workCanvas.getContext('2d');

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = cropArea.w;
        
        if (selectedMode === 'score') {
            finalCanvas.height = cropArea.h * files.length;
        } else {
            finalCanvas.height = cropArea.h;
        }
        const finalCtx = finalCanvas.getContext('2d');

        let currentY = 0;
        let imagesDataArray = [];

        for (let i = 0; i < files.length; i++) {
            await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        workCtx.clearRect(0, 0, cropArea.w, cropArea.h);
                        workCtx.drawImage(img, cropArea.x, cropArea.y, cropArea.w, cropArea.h, 0, 0, cropArea.w, cropArea.h);
                        
                        if (selectedMode === 'score') {
                            finalCtx.drawImage(workCanvas, 0, currentY);
                            currentY += cropArea.h;
                        } else {
                            imagesDataArray.push(workCanvas.toDataURL('image/jpeg', 0.9));
                        }
                        log.textContent = `画像加工中: ${i + 1} / ${files.length} 枚目...`;
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(files[i]);
            });
        }
        return { canvas: finalCanvas, handoutData: imagesDataArray };
    }

    // 5. JPGダウンロード
    jpgBtn.addEventListener('click', async () => {
        toggleDownloadButtons(false);
        const result = await generateFinalCanvas();
        
        const link = document.createElement('a');
        link.download = 'combined_sheet_music.jpg';
        link.href = result.canvas.toDataURL('image/jpeg', 0.9);
        link.click();
        
        log.style.color = "#2ecc71";
        log.textContent = "✅ 余白なしJPG画像の生成・保存に成功しました！";
        toggleDownloadButtons(true);
    });

    // 6. PDFダウンロード
    pdfBtn.addEventListener('click', async () => {
        toggleDownloadButtons(false);
        const result = await generateFinalCanvas();
        
        log.textContent = "PDFファイルへ変換中...";
        
        // 巻き添えエラー対策：jsPDFの参照を「ボタンを押したこの瞬間」に実行する
        if (!window.jspdf || !window.jspdf.jsPDF) {
            log.style.color = "#e74c3c";
            log.textContent = "エラー: PDFライブラリの読み込みがまだ完了していません。通信環境の良い場所でもう一度お試しください。";
            toggleDownloadButtons(true);
            return;
        }
        const { jsPDF } = window.jspdf;
        
        const ptW = cropArea.w * 0.75;
        const ptH = cropArea.h * 0.75;

        if (selectedMode === 'score') {
            const totalPtH = ptH * files.length;
            const pdf = new jsPDF('p', 'pt', [ptW, totalPtH]);
            const imgData = result.canvas.toDataURL('image/jpeg', 0.9);
            pdf.addImage(imgData, 'JPEG', 0, 0, ptW, totalPtH);
            pdf.save('combined_sheet_music.pdf');
        } else {
            const orientation = cropArea.w >= cropArea.h ? 'l' : 'p';
            const pdf = new jsPDF(orientation, 'pt', [ptW, ptH]);
            
            for (let i = 0; i < result.handoutData.length; i++) {
                if (i > 0) pdf.addPage([ptW, ptH], orientation);
                pdf.addImage(result.handoutData[i], 'JPEG', 0, 0, ptW, ptH);
            }
            pdf.save('handout_material.pdf');
        }
        
        log.style.color = "#2ecc71";
        log.textContent = "✅ 余白なしPDFファイルの生成・保存に成功しました！";
        toggleDownloadButtons(true);
    });
</script>
</body>
</html>
